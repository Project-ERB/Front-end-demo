<aside class="flex h-full flex-col border-r border-[#e2e8f0] bg-white">

    <!-- Header -->
    <div class="flex h-16 items-center justify-between border-b border-[#e2e8f0] px-6">
        <div class="flex items-center gap-2">
            <div class="flex size-8 items-center justify-center rounded-lg bg-[#1e3b8a] text-white">
                <span class="material-symbols-outlined text-xl">analytics</span>
            </div>
            <span class="text-lg font-bold text-[#0f172a]">Acme Corp</span>
        </div>

        <!-- زرار إغلاق بيظهر على الموبايل بس -->
        @if (isMobileOpen) {
        <button class="p-1 rounded-md text-[#64748b] hover:bg-[#f1f5f9] transition-colors cursor-pointer"
            (click)="onCloseMobile()">
            <span class="material-symbols-outlined text-xl">close</span>
        </button>
        }
    </div>

    <div class="flex flex-1 flex-col justify-between overflow-y-auto p-4">
        <nav class="flex flex-col gap-1">
            <p class="px-3 pb-2 pt-4 text-xs font-semibold uppercase text-[#64748b]">
                Main Menu
            </p>

            <a routerLink="/warehouse-dashboard" routerLinkActive="bg-[#1e3b8a]/10 text-[#1e3b8a]"
                class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors text-[#64748b] hover:bg-[#eff6ff] hover:text-[#1e3b8a]"
                (click)="onLinkClick()">
                <span class="material-symbols-outlined text-[20px]">dashboard</span>
                Warehouse Dashboard
            </a>

            <a routerLink="/warehouse-management" routerLinkActive="bg-[#1e3b8a]/10 text-[#1e3b8a]"
                class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors text-[#64748b] hover:bg-[#eff6ff] hover:text-[#1e3b8a]"
                (click)="onLinkClick()">
                <span class="material-symbols-outlined text-[20px]">warehouse</span>
                Warehouse Management
            </a>

            <!-- Inventory -->
            <a routerLink="/warehouse-details" [queryParams]="{tab: 'inventory'}"
                routerLinkActive="bg-[#1e3b8a]/10 text-[#1e3b8a]"
                class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors text-[#64748b] hover:bg-[#eff6ff] hover:text-[#1e3b8a]"
                (click)="onLinkClick()">
                <span class="material-symbols-outlined text-[20px]">inventory_2</span>
                Inventories
            </a>

            <!-- Inventory Prediction -->
            <a routerLink="/inventory-prediction" routerLinkActive="bg-[#1e3b8a]/10 text-[#1e3b8a]"
                class="group flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors text-[#64748b] hover:bg-[#eff6ff] hover:text-[#1e3b8a]"
                (click)="onLinkClick()">
                <span class="material-symbols-outlined text-[20px]">query_stats</span>
                Inventory Prediction
            </a>
        </nav>

        <div class="border-t border-slate-100 p-4">
            <button (click)="onLogout()"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg w-full text-red-500 hover:bg-red-50 transition-colors cursor-pointer">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-medium text-sm">Logout</span>
            </button>
        </div>
    </div>
</aside>
