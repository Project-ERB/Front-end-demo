<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-gray-200 dark:border-border-dark px-8 py-4 bg-white dark:bg-background-dark z-10 shrink-0">
    <div class="flex items-center gap-4">
        <button class="md:hidden text-slate-500 dark:text-slate-400">
              <span class="material-symbols-outlined">menu</span>
            </button>
        <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Dashboard Overview</h2>
    </div>

    <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center relative w-80">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <span class="material-symbols-outlined text-[20px]">search</span>
            </div>
            <input type="text" class="block w-full rounded-lg border-0 py-2 pl-10 pr-3 text-slate-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary dark:bg-surface-dark dark:text-white dark:ring-border-dark dark:placeholder-slate-500 sm:text-sm sm:leading-6"
                placeholder="Search users, logs, or settings...">
            <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
                <span class="text-xs text-slate-500 border border-slate-600 rounded px-1.5 py-0.5">⌘K</span>
            </div>
        </div>

        <div class="flex gap-3">
            <button class="flex items-center justify-center size-10 rounded-lg hover:bg-gray-100 dark:hover:bg-surface-dark text-slate-600 dark:text-slate-400 transition-colors relative">
                <span class="material-symbols-outlined text-[22px]">notifications</span>
                <span class="absolute top-2 right-2 size-2 bg-red-500 rounded-full border-2 border-white dark:border-background-dark"></span>
              </button>
            <button class="flex items-center justify-center size-10 rounded-lg hover:bg-gray-100 dark:hover:bg-surface-dark text-slate-600 dark:text-slate-400 transition-colors">
                <span class="material-symbols-outlined text-[22px]">help</span>
              </button>
        </div>
    </div>
</header>
