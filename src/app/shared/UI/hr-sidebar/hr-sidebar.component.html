<aside
    class="w-64 bg-white border-r border-slate-200 flex flex-col h-screen flex-shrink-0 dark:bg-gray-900 dark:border-gray-800">

    <!-- Logo -->
    <div class="flex h-16 items-center border-b border-[#e5e7eb] dark:border-gray-800 px-6">
        <div class="flex items-center gap-2 text-main">
            <div class="flex items-center justify-center rounded-lg bg-main/10 p-1.5">
                <span class="material-symbols-outlined text-main fill" style="font-size: 28px;">hr_resting</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-[#111318] dark:text-white">HR ERP</h1>
        </div>
    </div>

    <!-- Links -->
    <div class="flex flex-col gap-4 p-4">

        <!-- Main -->
        <div class="flex flex-col gap-1">
            <p class="px-3 text-xs font-semibold uppercase tracking-wider text-[#616f89] dark:text-gray-400 mb-2">
                Main
            </p>

            <a routerLink="/hr-dashboard" routerLinkActive="bg-main/10 text-main"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined fill">dashboard</span>
                <p class="text-sm font-medium">Dashboard</p>
            </a>

            <a routerLink="/employee-managment" routerLinkActive="bg-main/10 text-main"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined">group</span>
                <p class="text-sm font-medium">Employees</p>
            </a>

            <a routerLink="/hr-department" routerLinkActive="bg-main/10 text-main"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined">domain</span>
                <p class="text-sm font-medium">Departments</p>
            </a>
        </div>

        <!-- Recruitment -->
        <div class="flex flex-col gap-1">
            <p class="px-3 text-xs font-semibold uppercase tracking-wider text-[#616f89] dark:text-gray-400 mb-2 mt-2">
                Recruitment
            </p>

            <a routerLink="/job-requierments-management" routerLinkActive="bg-main/10 text-main"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined">badge</span>
                <p class="text-sm font-medium">Recruitment</p>
            </a>

            <a routerLink="/application-management" routerLinkActive="bg-main/10 text-main"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined">badge</span>
                <p class="text-sm font-medium">Applications</p>
            </a>

            <a routerLink="/candidate-management" routerLinkActive="bg-main/10 text-main"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[#616f89] hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800 transition-all">

                <span class="material-symbols-outlined">person_search</span>
                <p class="text-sm font-medium">Candidates</p>
            </a>
        </div>

    </div>

    <!-- User -->
    <div class="mt-auto p-4 border-t border-[#e5e7eb] dark:border-gray-800">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 overflow-hidden rounded-full bg-gray-200">
                <img alt="Profile" class="h-full w-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-pNbtJjKa4oLlCUGQztdxJmbDa5bbZ1SvOjs2CjDERxaaf3WS_ctEM706K8YBImlIIx3OvuA-gP3WeLJq03T5jLyxdgJhrgXvIU8uTUpWvbLN64Kx78IhmcCA1qkZozAtKhG4brDZnwWm3xIMlhDFx_B4dBA7AYbA-dfAHh1MalcfJTRY6fQtV-jjq6Gp_lDGKeEWHTW4GoyiDBfX7F7H1nGGCHtIxfT9n-FFqQjjC0-g_ITfEI9hzu_XcoqF5w7dYgzaitSDAWFH" />
            </div>
            <div class="flex flex-col">
                <p class="text-sm font-medium text-[#111318] dark:text-white">Jane Cooper</p>
                <p class="text-xs text-[#616f89]">HR Manager</p>
            </div>
        </div>
    </div>

</aside>
