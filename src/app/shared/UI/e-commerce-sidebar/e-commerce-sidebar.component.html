<!-- خلفية شفافة تظهر خلف الـ Sidebar في الموبايل -->
<div class="fixed inset-0 z-20 bg-black/50 backdrop-blur-sm transition-opacity duration-300 lg:hidden"
    [ngClass]="{'opacity-100 pointer-events-auto': isMobileSidebarOpen, 'opacity-0 pointer-events-none': !isMobileSidebarOpen}"
    (click)="closeMobileSidebar()">
</div>

<aside
    class="mobile-sidebar fixed left-0 top-0 z-30 flex h-full w-72 max-w-[85vw] shrink-0 flex-col justify-between border-r border-gray-200/80 dark:border-gray-800 bg-white/95 dark:bg-background-dark/95 backdrop-blur-xl p-4 transition-transform duration-300 lg:sticky lg:top-0 lg:h-screen lg:z-auto lg:w-64 lg:max-w-none lg:translate-x-0"
    [ngClass]="{'translate-x-0': isMobileSidebarOpen, '-translate-x-full': !isMobileSidebarOpen}">

    <div class="flex flex-col gap-6">

        <!-- Mobile Header -->
        <div class="flex items-center justify-between lg:hidden">
            <h3 class="text-sm font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">Menu</h3>
            <button (click)="closeMobileSidebar()"
                class="rounded-lg p-1.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-white/10">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- Account -->
        <div class="flex flex-col gap-2">
            <p class="px-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Account</p>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/customer-profile" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">person</span>My Profile
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/my-orders" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">shopping_bag</span>My Orders
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/my-receivables" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">account_balance_wallet</span>
                My Receivables
            </a>

            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/my-invoices" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">receipt_long</span>
                My Invoices
            </a>

            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/my-payments" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">payments</span>
                My Payments
            </a>

            <a routerLink="/#"
                class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                (click)="closeMobileSidebar(); logout()">
                <span class="material-symbols-outlined text-xl">logout</span>
                Logout
            </a>
        </div>

    </div>

    <div class="flex flex-col gap-1 border-t border-gray-200 dark:border-gray-800 pt-4"></div>
</aside>
