<aside
    class="mobile-sidebar fixed left-0 top-0 z-30 flex h-full w-72 max-w-[85vw] shrink-0 flex-col justify-between border-r border-gray-200/80 dark:border-gray-800 bg-white/95 dark:bg-background-dark/95 backdrop-blur-xl p-4 transition-transform duration-300 lg:relative lg:z-auto lg:w-64 lg:max-w-none lg:translate-x-0"
    [class.translate-x-0]="isMobileSidebarOpen" [class.-translate-x-full]="!isMobileSidebarOpen">
    <div class="flex flex-col gap-6">

        <!-- Mobile Header -->
        <div class="flex items-center justify-between lg:hidden">
            <h3 class="text-sm font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">Menu</h3>
            <button (click)="closeMobileSidebar()"
                class="rounded-lg p-1.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-white/10">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- Account -->
        <div class="flex flex-col gap-2">
            <p class="px-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Account</p>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/customer-profile" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">person</span>My Profile
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10 text-sm font-medium"
                routerLink="/my-orders" (click)="closeMobileSidebar()">
                <span class="material-symbols-outlined text-xl">shopping_bag</span>My Orders
            </a>
        </div>

        <!-- Categories -->
        <div class="flex flex-col gap-1">
            <p class="px-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">
                Categories</p>

            <!-- All Products -->
            <button (click)="selectCategory(null)"
                class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium w-full text-left transition-colors duration-150"
                [ngClass]="selectedCategoryId === null
          ? 'bg-main/10 dark:bg-main/20 text-main dark:text-white font-semibold'
          : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10'">
                <span class="material-symbols-outlined text-xl"
                    [style.font-variation-settings]="selectedCategoryId === null ? '\'FILL\' 1' : '\'FILL\' 0'">
                    grid_view
                </span>
                All Products
            </button>

            <!-- Loading Skeleton -->
            <ng-container *ngIf="isCategoriesLoading">
                <div *ngFor="let i of [1,2,3]" class="flex items-center gap-3 px-3 py-2 animate-pulse">
                    <div class="h-5 w-5 rounded bg-gray-200 dark:bg-gray-700"></div>
                    <div class="h-4 w-28 rounded bg-gray-200 dark:bg-gray-700"></div>
                </div>
            </ng-container>

            <!-- Parent Categories -->
            <ng-container *ngIf="!isCategoriesLoading">
                <ng-container *ngFor="let parent of categories">
                    <button (click)="selectCategory(parent.id)"
                        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium w-full text-left transition-colors duration-150"
                        [ngClass]="selectedCategoryId === parent.id
              ? 'bg-main/10 dark:bg-main/20 text-main dark:text-white font-semibold'
              : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-white/10'">
                        <span class="material-symbols-outlined text-xl shrink-0"
                            [style.font-variation-settings]="selectedCategoryId === parent.id ? '\'FILL\' 1' : '\'FILL\' 0'">
                            category
                        </span>
                        <span class="truncate flex-1">{{ parent.name }}</span>
                        <span *ngIf="parent.children?.length > 0" (click)="toggleExpand(parent.id, $event)"
                            class="material-symbols-outlined text-base shrink-0 transition-transform duration-200 text-gray-400"
                            [class.rotate-180]="expandedCategoryId === parent.id">
                            expand_more
                        </span>
                    </button>

                    <!-- Children -->
                    <div *ngIf="parent.children?.length > 0 && expandedCategoryId === parent.id"
                        class="flex flex-col gap-0.5 ml-4 pl-3 border-l border-gray-200 dark:border-gray-700 mt-0.5 mb-1">
                        <button *ngFor="let child of parent.children" (click)="selectCategory(child.id)"
                            class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm w-full text-left transition-colors duration-150"
                            [ngClass]="selectedCategoryId === child.id
                ? 'bg-main/10 dark:bg-main/20 text-main dark:text-white font-semibold'
                : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/10 font-medium'">
                            <span class="material-symbols-outlined text-base shrink-0">subdirectory_arrow_right</span>
                            <span class="truncate">{{ child.name }}</span>
                        </button>
                    </div>
                </ng-container>
            </ng-container>
        </div>
    </div>

    <div class="flex flex-col gap-1 border-t border-gray-200 dark:border-gray-800 pt-4"></div>
</aside>
