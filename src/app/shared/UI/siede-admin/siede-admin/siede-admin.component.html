<!-- siede-admin.component.html -->

<!-- Backdrop -->
<!-- Backdrop (مخفي لو كان شغال كـ overlay في الموبايل) -->
<div *ngIf="!isOpen" class="sidebar-backdrop" [class.active]="sidebarOpen" (click)="close()"></div>

<!-- Sidebar -->
<aside class="w-72 bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 z-20 sidebar-aside"
    [class.open]="sidebarOpen">

    <!-- باقي الكود كما هو بالضبط بدون أي تغيير -->
    <button (click)="close()"
        class="sidebar-close-btn absolute top-4 right-3 size-7 items-center justify-center rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all active:scale-90 z-10">
        <span class="material-symbols-outlined text-[18px]">close</span>
    </button>

    <!-- Logo -->
    <div class="p-6 border-b border-slate-100">
        <a routerLink="/admin-dashboard" class="flex items-center gap-3 group transition-all duration-300">

            <!-- أيقونة الـ Stack والكارت لوحدها (من غير الكلام) -->
            <div class="flex-shrink-0">
                <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 5 14 L 9 29 L 31 29 L 35 14" fill="none" stroke="#2463eb" stroke-width="2.8"
                        stroke-linejoin="round" stroke-linecap="round" />
                    <path d="M 11 14 C 11 4 29 4 31 14" fill="none" stroke="#2463eb" stroke-width="2.8"
                        stroke-linecap="round" />
                    <circle cx="14" cy="33" r="2" fill="#2463eb" />
                    <circle cx="26" cy="33" r="2" fill="#2463eb" />
                    <rect x="13" y="21" width="8" height="7" rx="1.5" fill="#2463eb" opacity="0.9" />
                    <rect x="19" y="14" width="8" height="7" rx="1.5" fill="#2463eb" opacity="0.5" />
                </svg>
            </div>

            <!-- الكلام (Commerce Stack) -->
            <div class="flex flex-col">
                <span class="text-lg font-bold text-slate-800 group-hover:text-[#2463eb] transition-colors">
                    Commerce
                    <span class="bg-gradient-to-r from-[#2463eb] to-indigo-500 bg-clip-text text-transparent">
                        Stack</span>
                </span>
                <span class="text-[10px] font-medium text-slate-400 uppercase tracking-widest">Admin Panel</span>
            </div>

        </a>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
        <p class="px-2 mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">Main Menu</p>

        <a routerLink="/admin-dashboard" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-semibold text-sm">Dashboard</span>
        </a>

        <a routerLink="/user-management" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">group</span>
            <span class="font-medium text-sm">User Management</span>
        </a>

        <a routerLink="/permissions" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <span class="font-medium text-sm">Permissions Management</span>
        </a>

        <a routerLink="/role-mangement" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">verified_user</span>
            <span class="font-medium text-sm">Role Management</span>
        </a>

        <a routerLink="/system-logs" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">wysiwyg</span>
            <span class="font-medium text-sm">System Logs</span>
        </a>

        <a routerLink="/developer" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <span class="material-symbols-outlined">code</span>
            <span class="font-medium text-sm">Developer</span>
        </a>

        <!-- <a routerLink="/sales-analysis" routerLinkActive="bg-[#2463eb]/10 text-[#2463eb]"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">

            <span class="material-symbols-outlined">analytics</span>

            <span class="font-medium text-sm">Sales-Dashboard</span>
        </a> -->

        <p class="px-2 mt-8 mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">System</p>

        <div class="p-4 border-t border-slate-100">
            <button (click)="onLogout()"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg w-full text-red-500 hover:bg-red-50 transition-colors cursor-pointer">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-medium text-sm">Logout</span>
            </button>
        </div>
    </nav>

</aside>
