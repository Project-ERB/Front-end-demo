<div class="flex h-screen w-full overflow-hidden font-[Manrope,sans-serif] antialiased bg-[#f6f6f8] text-[#131118]">

    <app-siede-admin></app-siede-admin>

    <main class="flex h-full flex-1 flex-col overflow-hidden relative">

        <!-- Header -->
        <header class="flex h-20 w-full shrink-0 items-center justify-between border-b border-[#dedbe6] bg-white px-8">
            <div class="flex items-center gap-4">
                <button class="block lg:hidden text-[#6e6189] hover:text-[#6324eb]">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="relative hidden w-96 md:block">
                    <span
                        class="absolute left-3 top-1/2 -translate-y-1/2 text-[#6e6189] material-symbols-outlined text-[20px]">search</span>
                    <input type="text" placeholder="Search roles, permissions..."
                        class="h-10 w-full rounded-lg border-none bg-[#f6f6f8] py-2 pl-10 pr-4 text-sm text-[#131118] placeholder-[#6e6189]/60 focus:outline-none focus:ring-2 focus:ring-[#6324eb]/20 transition-all" />
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="relative flex h-10 w-10 items-center justify-center rounded-full text-[#6e6189] hover:bg-[#f6f6f8] transition-colors">
                    <span class="material-symbols-outlined">notifications</span>
                    <span
                        class="absolute right-2 top-2 h-2.5 w-2.5 rounded-full bg-red-500 border-2 border-white"></span>
                </button>
            </div>
        </header>

        <!-- Body -->
        <div class="flex-1 overflow-y-auto p-8 pb-32">
            <div class="mx-auto max-w-5xl">

                <!-- Breadcrumbs -->
                <nav class="mb-6 flex items-center gap-2 text-sm font-medium text-[#6e6189]">
                    <a href="#" class="hover:text-[#6324eb] hover:underline transition-colors">Settings</a>
                    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    <a href="#" class="hover:text-[#6324eb] hover:underline transition-colors">Roles</a>
                    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    <span class="text-[#131118]">Create New</span>
                </nav>

                <!-- Title -->
                <div class="mb-8">
                    <h2 class="text-3xl font-extrabold text-[#131118] tracking-tight">Create Custom Role</h2>
                    <p class="text-[#6e6189] mt-1">Define a new role and configure access permissions granularly.</p>
                </div>

                <form [formGroup]="RoleForm" (ngSubmit)="createRole()">

                    <!-- Role Details Card -->
                    <div class="rounded-2xl border border-[#dedbe6] bg-white p-8 shadow-sm mb-6">
                        <h3 class="text-base font-bold text-[#131118] mb-6">Role Details</h3>

                        <div class="grid gap-6 lg:grid-cols-2">
                            <!-- Name -->
                            <div>
                                <label class="mb-2 block text-sm font-semibold text-[#131118]" for="roleName">
                                    Role Name <span class="text-red-500">*</span>
                                </label>
                                <div class="relative">
                                    <input type="text" formControlName="name" id="roleName"
                                        placeholder="e.g. Sales Manager"
                                        class="w-full appearance-none rounded-lg border border-[#dedbe6] bg-[#f6f6f8] px-4 py-3 text-sm text-[#131118] placeholder:text-[#6e6189]/60 focus:outline-none focus:border-[#6324eb] focus:ring-2 focus:ring-[#6324eb]/20 transition-all" />
                                </div>
                                <p *ngIf="formError" class="mt-1.5 text-xs text-red-500 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">error</span>
                                    {{ formError }}
                                </p>
                            </div>

                            <!-- Description -->
                            <div>
                                <label class="mb-2 block text-sm font-semibold text-[#131118]" for="desc">
                                    Description
                                </label>
                                <textarea formControlName="description" id="desc" rows="3"
                                    placeholder="Briefly describe the responsibilities..."
                                    class="w-full rounded-lg border border-[#dedbe6] bg-[#f6f6f8] px-4 py-3 text-sm text-[#131118] placeholder:text-[#6e6189]/60 resize-none focus:outline-none focus:border-[#6324eb] focus:ring-2 focus:ring-[#6324eb]/20 transition-all">
                                </textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="mt-6 flex items-center gap-4">
                        <button type="submit" [disabled]="isSaving || RoleForm.invalid"
                            [ngClass]="{ 'cursor-wait': isSaving }"
                            class="flex items-center justify-center gap-2 min-w-[140px] rounded-lg bg-[#6324eb] px-8 py-2.5 text-sm font-bold text-white shadow-lg shadow-[#6324eb]/25 hover:bg-[#501ac2] disabled:opacity-60 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-[#6324eb] focus:ring-offset-2 transition-all">
                            <svg class="h-4 w-4 text-white" [ngClass]="{ 'animate-spin': isSaving }"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                            </svg>

                            <span>{{ isSaving ? 'Saving...' : 'Save Role' }}</span>
                        </button>

                        <button type="button" (click)="cancel()"
                            class="rounded-lg border border-[#dedbe6] bg-white px-6 py-2.5 text-sm font-bold text-[#131118] hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-200 transition-colors">
                            Cancel
                        </button>

                        <span *ngIf="saveSuccess"
                            class="text-sm text-emerald-600 flex items-center gap-1.5 font-medium">
                            <span class="material-symbols-outlined text-[16px]">check_circle</span>
                            Role saved successfully!
                        </span>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>
