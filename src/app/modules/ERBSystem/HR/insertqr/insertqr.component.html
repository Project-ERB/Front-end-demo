<div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-xl overflow-hidden">

        <!-- Accent bar -->
        <div class="h-1 w-full" style="background:linear-gradient(90deg,#7c3aed,#a78bfa)"></div>

        <!-- Header -->
        <div class="px-6 pt-6 pb-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
            <button (click)="goBack()"
                class="size-9 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span>
            </button>
            <div class="size-10 rounded-xl flex items-center justify-center text-white flex-shrink-0"
                style="background-color:#7c3aed;">
                <span class="material-symbols-outlined" style="font-size:22px;">qr_code_scanner</span>
            </div>
            <div>
                <h2 class="text-base font-bold text-slate-900 dark:text-white">Insert QR Code</h2>
                <p class="text-xs text-slate-400">Upload a QR image to record attendance</p>
            </div>
        </div>

        <!-- Body -->
        <div class="px-6 py-6 space-y-5">

            <!-- Success State -->
            <div *ngIf="success" class="flex flex-col items-center gap-3 py-8">
                <div class="size-20 rounded-full bg-emerald-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-emerald-600" style="font-size:42px;">check_circle</span>
                </div>
                <p class="text-lg font-bold text-slate-900 dark:text-white">QR Code Processed!</p>
                <p class="text-sm text-slate-500">Attendance recorded successfully.</p>
                <button (click)="clearFile()"
                    class="mt-2 px-6 py-2.5 rounded-xl text-white text-sm font-bold transition-all"
                    style="background-color:#7c3aed;">
                    Upload Another
                </button>
            </div>

            <ng-container *ngIf="!success">

                <!-- Upload Area -->
                <div *ngIf="!previewUrl"
                    class="border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center cursor-pointer hover:border-violet-400 hover:bg-violet-50 dark:hover:bg-violet-900/10 transition-all"
                    (click)="fileInput.click()">
                    <div
                        class="size-14 rounded-2xl bg-violet-100 dark:bg-violet-900/30 flex items-center justify-center mx-auto mb-3">
                        <span class="material-symbols-outlined text-violet-500"
                            style="font-size:28px;">upload_file</span>
                    </div>
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-300">Click to upload QR image</p>
                    <p class="text-xs text-slate-400 mt-1">PNG, JPG, JPEG supported</p>
                </div>

                <!-- Preview -->
                <div *ngIf="previewUrl"
                    class="relative rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
                    <img [src]="previewUrl" alt="QR Preview" class="w-full object-contain max-h-64" />
                    <button (click)="clearFile()"
                        class="absolute top-2 right-2 size-8 bg-white dark:bg-slate-800 rounded-full shadow flex items-center justify-center text-slate-400 hover:text-rose-500 transition-colors">
                        <span class="material-symbols-outlined" style="font-size:18px;">close</span>
                    </button>
                </div>

                <!-- File name -->
                <div *ngIf="selectedFile"
                    class="flex items-center gap-3 px-4 py-3 bg-violet-50 dark:bg-violet-900/20 rounded-xl border border-violet-100 dark:border-violet-800">
                    <span class="material-symbols-outlined text-violet-500" style="font-size:20px;">image</span>
                    <p class="text-sm font-medium text-violet-700 dark:text-violet-300 truncate">{{ selectedFile.name }}
                    </p>
                </div>

                <!-- Error -->
                <div *ngIf="errorMsg"
                    class="flex items-center gap-2 px-4 py-3 bg-rose-50 dark:bg-rose-900/20 rounded-xl border border-rose-200 text-rose-600 text-sm">
                    <span class="material-symbols-outlined" style="font-size:18px;">error</span>
                    {{ errorMsg }}
                </div>

                <!-- Submit Button -->
                <button (click)="submit()" [disabled]="!selectedFile || loading"
                    class="w-full py-3 rounded-xl text-white text-sm font-bold transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    style="background-color:#7c3aed;">
                    <div *ngIf="loading"
                        class="size-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    <span class="material-symbols-outlined" *ngIf="!loading"
                        style="font-size:18px;">qr_code_scanner</span>
                    {{ loading ? 'Processing…' : 'Submit QR Code' }}
                </button>

            </ng-container>

        </div>
    </div>
</div>

<!-- Hidden file input -->
<input #fileInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
