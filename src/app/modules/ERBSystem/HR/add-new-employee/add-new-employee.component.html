<div
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <app-hr-sidebar></app-hr-sidebar>
    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Top Navigation -->
        <nav
            class="h-16 flex items-center justify-between px-8 bg-surface-light dark:bg-surface-dark border-b border-gray-200 dark:border-slate-800 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button class="lg:hidden text-slate-500 hover:text-main">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="relative w-96 hidden md:block">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                        <span class="material-symbols-outlined text-[20px]">search</span>
                    </div>
                    <input
                        class="block w-full h-10 pl-10 pr-3 py-2 border-none rounded-lg bg-slate-100 dark:bg-slate-800 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-main/50 transition-all"
                        placeholder="Search employees, documents..." type="text" />
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button
                    class="relative p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">notifications</span>
                    <span
                        class="absolute top-2 right-2 size-2 bg-red-500 rounded-full border-2 border-white dark:border-surface-dark"></span>
                </button>
                <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <div class="flex items-center gap-3 cursor-pointer group">
                    <div class="bg-center bg-no-repeat bg-cover rounded-full size-9 border-2 border-white dark:border-slate-700 shadow-sm group-hover:border-main transition-colors"
                        data-alt="Portrait of a smiling HR manager in professional attire"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDGR1Us3xXJCPXukOZGrhU4KgU3ujn_SL7GiWjq2lmDzCG_oPbeh0yc00u45PXMIKVX6wbc3NmqOcpHvxgmia2XZhr4-ORzP8v_BW2aTcOsenL-S1tXx4OYyoPCwsTYW7O4e5o05coJtJqKYDxnMhXD_7qcGDZhE-TV5xOH3mmenuY270ZlV3M_wjGPhWUwVEGLZBUrt1myVCJ2NdVf03C6DUQqauB4tQsTIFxeaWeL0YukJXitGTmYOtvVQ-WTxHhy-8Yq62TBR7ga");'>
                    </div>
                    <div class="hidden md:flex flex-col text-sm">
                        <span class="font-semibold text-slate-900 dark:text-white">Sarah Jenkins</span>
                        <span class="text-slate-500 dark:text-slate-400 text-xs">HR Manager</span>
                    </div>
                    <span
                        class="material-symbols-outlined text-slate-400 group-hover:text-main text-[20px]">expand_more</span>
                </div>
            </div>
        </nav>
        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto p-8 bg-background-light dark:bg-background-dark bg-main-gray">
            <div class="max-w-5xl mx-auto space-y-6">
                <!-- Breadcrumbs -->
                <nav class="flex items-center text-sm text-slate-500 dark:text-slate-400">
                    <a class="hover:text-main transition-colors" href="#">Home</a>
                    <span class="mx-2 text-slate-300 dark:text-slate-600">/</span>
                    <a class="hover:text-main transition-colors" href="#">Employees</a>
                    <span class="mx-2 text-slate-300 dark:text-slate-600">/</span>
                    <span class="text-main font-medium">Add New</span>
                </nav>
                <!-- Page Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Add New Employee
                        </h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">Create a new employee record. Fill in all
                            required fields to onboard.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button
                            class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors cursor-pointer active:scale-95 duration-200">
                            Save as Draft
                        </button>
                        <button
                            class="px-4 py-2 text-sm font-medium text-white bg-main rounded-lg shadow-sm hover:bg-blue-600 focus:ring-4 focus:ring-main/20 transition-all flex items-center gap-2 cursor-pointer active:scale-95 duration-200">
                            <span>Next Step</span>
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </button>
                    </div>
                </div>
                <!-- Stepper / Tabs -->
                <div
                    class="bg-surface-light dark:bg-surface-dark bg-white rounded-xl shadow-sm border border-gray-200 dark:border-slate-800 overflow-hidden hover:shadow-lg dark:hover:shadow-black/50 transition-all duration-300 hover:-translate-y-1">
                    <div class="grid grid-cols-4 dark:divide-slate-800">
                        <button
                            class="flex items-center justify-center gap-3 py-4 bg-main/10 dark:bg-main/10 border-b-3 border-main cursor-pointer">
                            <span
                                class="flex items-center justify-center size-6 rounded-full bg-main text-white text-xs font-bold">1</span>
                            <span class="text-sm font-bold text-main">Personal Info</span>
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 py-4 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b-2 border-transparent cursor-pointer">
                            <span
                                class="flex items-center justify-center size-6 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold">2</span>
                            <span class="text-sm font-medium">Employment</span>
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 py-4 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b-2 border-transparent cursor-pointer">
                            <span
                                class="flex items-center justify-center size-6 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold">3</span>
                            <span class="text-sm font-medium">Banking &amp; Tax</span>
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 py-4 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b-2 border-transparent cursor-pointer">
                            <span
                                class="flex items-center justify-center size-6 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-xs font-bold">4</span>
                            <span class="text-sm font-medium">Documents</span>
                        </button>
                    </div>
                    <!-- Form Content Area -->
                    <div class="p-6 md:p-8">
                        <form class="space-y-8" onsubmit="event.preventDefault();">
                            <!-- Section: Profile Image -->
                            <div class="flex flex-col sm:flex-row gap-8 items-start">
                                <div class="shrink-0 group relative">
                                    <div class="group relative">
                                        <label class="relative size-32 rounded-full bg-slate-100 dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-600 flex items-center justify-center overflow-hidden cursor-pointer hover:border-primary transition">
                                            <!-- Hidden File Input -->
                                            <input type="file" class="hidden" accept="image/*" />
                                            <!-- Icon -->
                                            <span class="material-symbols-outlined text-slate-400 text-4xl group-hover:scale-110 transition">
                                                add_a_photo
                                            </span>
                                            <!-- Circular Hover Overlay -->
                                            <div class="absolute inset-0 rounded-full bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                <p class="text-white text-xs font-medium">Change Photo</p>
                                            </div>
                                        </label>
                                    </div>
                                    <p class="mt-2 text-center text-xs text-slate-500 dark:text-slate-400">Profile
                                        Picture</p>
                                </div>
                                <div class="flex-1 space-y-6 w-full">
                                    <h3
                                        class="text-lg font-semibold text-slate-900 dark:text-white border-b border-gray-300 dark:border-slate-800 pb-2">
                                        Basic Details</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <!-- First Name -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="firstName">First Name <span class="text-red-500">*</span></label>
                                            <input
                                                class="w-full h-10 px-3 rounded-lg border-gray-300 border dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                                id="firstName" name="firstName" placeholder="e.g. Jonathan"
                                                type="text" />
                                        </div>
                                        <!-- Last Name -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="lastName">Last Name <span class="text-red-500">*</span></label>
                                            <input
                                                class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                                id="lastName" name="lastName" placeholder="e.g. Doe" type="text" />
                                        </div>
                                        <!-- Email -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="email">Personal Email <span class="text-red-500">*</span></label>
                                            <div class="relative">
                                                <div
                                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                                    <span class="material-symbols-outlined text-[18px]">mail</span>
                                                </div>
                                                <input
                                                    class="w-full h-10 pl-9 pr-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                                    id="email" name="email" placeholder="john.doe@example.com"
                                                    type="email" />
                                            </div>
                                        </div>
                                        <!-- Phone -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="phone">Phone Number <span class="text-red-500">*</span></label>
                                            <div class="relative">
                                                <div
                                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                                    <span class="material-symbols-outlined text-[18px]">call</span>
                                                </div>
                                                <input
                                                    class="w-full h-10 pl-9 pr-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                                    id="phone" name="phone" placeholder="+1 (555) 000-0000"
                                                    type="tel" />
                                            </div>
                                        </div>
                                        <!-- Date of Birth -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="dob">Date of Birth</label>
                                            <input
                                                class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all text-sm"
                                                id="dob" name="dob" type="date" />
                                        </div>
                                        <!-- Gender -->
                                        <div class="space-y-1.5">
                                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                                for="gender">Gender</label>
                                            <div class="relative">
                                                <select
                                                    class="w-full h-10 pl-3 pr-10 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all text-sm appearance-none"
                                                    id="gender" name="gender">
                                                    <option disabled="" selected="" value="">Select Gender</option>
                                                    <option value="male">Male</option>
                                                    <option value="female">Female</option>
                                                </select>
                                                <div
                                                    class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                                    <span
                                                        class="material-symbols-outlined text-[20px]">expand_more</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Section: Address -->
                            <div class="space-y-6 pt-4">
                                <h3
                                    class="text-lg font-semibold text-slate-900 dark:text-white border-b border-gray-300 dark:border-slate-800 pb-2">
                                    Residential Address</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="md:col-span-2 space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="address">Street Address</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="address" name="address" placeholder="123 Main St, Apt 4B" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="city">City</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="city" name="city" placeholder="New York" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="state">State / Province</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="state" name="state" placeholder="NY" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="zip">Zip / Postal Code</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="zip" name="zip" placeholder="10001" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="country">Country</label>
                                        <div class="relative">
                                            <select
                                                class="w-full h-10 pl-3 pr-10 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all text-sm appearance-none"
                                                id="country" name="country">
                                                <option value="us">United States</option>
                                                <option value="ca">Canada</option>
                                                <option value="uk">United Kingdom</option>
                                                <option value="au">Australia</option>
                                            </select>
                                            <div
                                                class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                                <span class="material-symbols-outlined text-[20px]">expand_more</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Section: Emergency Contact -->
                            <div class="space-y-6 pt-4">
                                <h3
                                    class="text-lg font-semibold text-slate-900 dark:text-white border-b border-slate-100 dark:border-slate-800 pb-2">
                                    Emergency Contact</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="emergencyName">Full Name</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="emergencyName" name="emergencyName" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="emergencyRelation">Relationship</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="emergencyRelation" name="emergencyRelation"
                                            placeholder="e.g. Spouse, Parent" type="text" />
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300"
                                            for="emergencyPhone">Phone Number</label>
                                        <input
                                            class="w-full h-10 px-3 rounded-lg border border-gray-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-main/20 focus:border-main transition-all placeholder-slate-400 text-sm"
                                            id="emergencyPhone" name="emergencyPhone" type="tel" />
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <!-- Footer / Actions -->
                    <div
                        class="px-6 md:px-8 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
                        <button
                            class="px-5 py-2.5 text-sm font-medium text-slate-600 border rounded-md border-gray-300 dark:border-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition-colors cursor-pointer active:scale-95 duration-200 hover:bg-gray-700 dark:hover:bg-slate-700 hover:text-white">
                            Cancel
                        </button>
                        <button
                            class="px-5 py-2.5 text-sm font-medium text-white bg-main rounded-lg shadow-sm cursor-pointer hover:bg-blue-600 focus:ring-4 focus:ring-main/20 transition-all flex items-center gap-2 active:scale-95 duration-200">
                            <span>Next: Employment Details</span>
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
