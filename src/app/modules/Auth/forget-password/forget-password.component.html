<div
    class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">

    <main
        class="w-full max-w-md space-y-8 rounded-xl bg-white p-8 shadow-sm dark:bg-background-dark/50 dark:border dark:border-slate-800 sm:p-10">

        @if (!requestSent()) {
        <div class="flex flex-col gap-3 text-center">
            <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Reset Your Password</h1>
            <p class="text-base text-slate-500 dark:text-slate-400">Enter your email to receive a password reset link.
            </p>
        </div>

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-6">
            <label class="flex flex-col">
                <span class="pb-2 text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</span>

                <div class="relative flex items-center">
                    <!-- أيقونة الظرف -->
                    <span class="material-symbols-outlined text-slate-400 absolute left-3 pointer-events-none">
                        mail
                    </span>

                    <input formControlName="email" type="email" placeholder="you@example.com"
                        class="w-full rounded-lg border border-slate-300 bg-white px-10 py-3 text-base text-slate-900 focus:border-main focus:ring-2 focus:ring-main/20 dark:border-slate-600 dark:bg-slate-900 dark:text-white transition-all outline-none"
                        [class.border-red-500]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" />
                </div>

                @if (forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched) {
                <p class="mt-1 text-xs text-red-500">
                    Please enter a valid email address.
                </p>
                }
            </label>

            <button type="submit" [disabled]="forgotPasswordForm.invalid || isSubmitting()"
                class="flex h-12 w-full items-center justify-center rounded-lg bg-main px-5 text-base font-bold text-white transition-all hover:bg-main/90 disabled:opacity-50 disabled:cursor-not-allowed">

                @if (!isSubmitting()) {
                <span>Send Reset Link</span>
                } @else {
                <span class="flex items-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Processing...
                </span>
                }
            </button>
        </form>
        }

        @else {
        <div class="flex flex-col items-center gap-4 text-center py-4 animate-in fade-in zoom-in duration-300">
            <div class="rounded-full bg-green-100 p-3 dark:bg-green-900/30">
                <span class="material-symbols-outlined text-4xl text-green-600 dark:text-green-400">check_circle</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Check your email</h1>
            <p class="text-slate-500 dark:text-slate-400">
                We've sent a password reset link to <br>
                <strong class="text-slate-900 dark:text-slate-200">{{ forgotPasswordForm.value.email }}</strong>
            </p>
            <button (click)="requestSent.set(false)" class="text-sm font-semibold text-main hover:underline mt-2">
                Try another email
            </button>
        </div>
        }

        <button (click)="ToLogin()"
            class="flex w-full items-center justify-center gap-2 text-sm font-medium text-slate-500 hover:text-main dark:text-slate-400 transition-colors">
            <span class="material-symbols-outlined text-base">arrow_back</span>
            <span>Back to Login</span>
        </button>

    </main>
</div>
