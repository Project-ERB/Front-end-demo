<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">

    <header class="absolute top-0 left-0 right-0 flex items-center justify-between whitespace-nowrap p-6 lg:px-12">
        <div class="flex items-center gap-3 text-slate-900 dark:text-white">
            <div class="h-6 w-6 text-primary">
                <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"></path>
        </svg>
            </div>
            <h2 class="text-lg font-bold tracking-tight">E-Commerce ERP</h2>
        </div>
        <div class="hidden items-center gap-8 md:flex">
            <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Products</a>
            <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Help</a>
            <div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
            <button class="px-4 py-2 text-sm font-bold hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">Log In</button>
        </div>
    </header>

    <main class="w-full max-w-md space-y-8 rounded-xl bg-white p-8 shadow-sm dark:bg-background-dark/50 dark:border dark:border-slate-800 sm:p-10">

        <ng-container *ngIf="!requestSent; else successState">
            <div class="flex flex-col gap-3 text-center">
                <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Reset Your Password</h1>
                <p class="text-base text-slate-500 dark:text-slate-400">Enter your email to receive a password reset link.</p>
            </div>

            <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex w-full flex-col gap-6">
                <label class="flex flex-col">
          <span class="pb-2 text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</span>
          <div class="relative">
            <span class="material-symbols-outlined pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">mail</span>
            <input 
              formControlName="email"
              type="email" 
              placeholder="you@example.com"
              class="w-full rounded-lg border border-slate-300 bg-white px-3.5 py-3 pl-11 text-base text-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-slate-600 dark:bg-slate-900 dark:text-white"
              [class.border-red-500]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
            />
          </div>
          <p *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" class="mt-1 text-xs text-red-500">
            Please enter a valid email address.
          </p>
        </label>

                <button type="submit" [disabled]="forgotPasswordForm.invalid || isSubmitting" class="flex h-12 w-full items-center justify-center rounded-lg bg-primary px-5 text-base font-bold text-white transition-all hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!isSubmitting">Send Reset Link</span>
          <span *ngIf="isSubmitting" class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Processing...
          </span>
        </button>
            </form>
        </ng-container>

        <ng-template #successState>
            <div class="flex flex-col items-center gap-4 text-center py-4">
                <div class="rounded-full bg-green-100 p-3 dark:bg-green-900/30">
                    <span class="material-symbols-outlined text-4xl text-green-600 dark:text-green-400">check_circle</span>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Check your email</h1>
                <p class="text-slate-500 dark:text-slate-400">
                    We've sent a password reset link to <br>
                    <strong class="text-slate-900 dark:text-slate-200">{{ forgotPasswordForm.value.email }}</strong>
                </p>
                <button (click)="requestSent = false" class="text-sm font-semibold text-primary hover:underline">
          Try another email
        </button>
            </div>
        </ng-template>

        <a class="flex items-center justify-center gap-2 text-sm font-medium text-slate-500 hover:text-primary dark:text-slate-400 transition-colors" href="#">
            <span class="material-symbols-outlined text-base">arrow_back</span>
            <span>Back to Login</span>
        </a>
    </main>
</div>
