<div class="absolute top-6 left-6 z-50">
    <a
        class="flex items-center gap-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-2xl px-5 py-3 border border-white/50 dark:border-gray-700/50 shadow-lg transition-all duration-300 hover:shadow-xl hover:scale-105">

        <svg width="170" height="32" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
            <!-- رسم عربة التسوق (Cart) -->
            <path d="M 5 14 L 9 29 L 31 29 L 35 14" fill="none" stroke="#2463eb" stroke-width="2.5"
                stroke-linejoin="round" stroke-linecap="round" />
            <path d="M 11 14 C 11 4 29 4 31 14" fill="none" stroke="#2463eb" stroke-width="2.5"
                stroke-linecap="round" />
            <circle cx="14" cy="33" r="2" fill="#2463eb" />
            <circle cx="26" cy="33" r="2" fill="#2463eb" />

            <!-- رسم الـ Stack (المربعات داخل العربة) -->
            <rect x="13" y="21" width="8" height="7" rx="1.5" fill="#2463eb" opacity="0.9" />
            <rect x="19" y="14" width="8" height="7" rx="1.5" fill="#2463eb" opacity="0.5" />

            <!-- كلمة Commerce -->
            <text x="45" y="27" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="500"
                fill="#334155">
                Commerce
            </text>

            <!-- كلمة Stack (زودت المسافة بزيادة الـ x ليكون 148 بدل 140) -->
            <text x="148" y="27" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="800"
                fill="url(#cartStackGrad)">
                Stack
            </text>

            <defs>
                <linearGradient id="cartStackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#2463eb" />
                    <stop offset="100%" stop-color="#6366f1" />
                </linearGradient>
            </defs>
        </svg>

    </a>
</div>

<div
    class="auth-photo-bg relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden p-4 font-display text-slate-800 dark:text-slate-200">

    <div
        class="pointer-events-none absolute left-0 top-0 h-[20rem] w-[20rem] rounded-full bg-[#2463eb]/15 blur-3xl -translate-x-1/3 -translate-y-1/3">
    </div>

    <div
        class="pointer-events-none absolute right-0 bottom-0 h-[22rem] w-[22rem] rounded-full bg-cyan-400/20 blur-3xl translate-x-1/4 translate-y-1/4">
    </div>

    <main @cardReveal
        class="glass-shimmer relative w-full max-w-md space-y-8 rounded-2xl border border-white/60 bg-white/80 p-8 shadow-[0_20px_70px_rgba(15,23,42,0.15)] backdrop-blur-xl dark:bg-background-dark/70 dark:border-slate-800 sm:p-10 overflow-hidden">

        <div class="space-y-6">

            <div class="flex flex-col gap-3 text-center">
                <div class="flex justify-center">
                    <div
                        class="flex h-14 w-14 items-center justify-center rounded-full bg-[#2463eb]/10 ring-8 ring-[#2463eb]/5 animate-pulse">
                        <span class="material-symbols-outlined text-3xl text-[#2463eb]">verified_user</span>
                    </div>
                </div>

                <span
                    class="mx-auto w-fit rounded-full bg-[#2463eb]/10 px-3 py-1 text-xs font-semibold tracking-wide text-[#2463eb]">
                    Email Verification
                </span>

                <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">
                    Verify Your Identity
                </h1>

                <p class="text-base text-slate-500 dark:text-slate-400">
                    Please enter the email address associated with this account to continue.
                </p>
            </div>

            <form [formGroup]="verifyForm" (ngSubmit)="onVerifyEmail()" class="flex w-full flex-col gap-6">

                <!-- Email Field -->
                <label class="flex flex-col gap-2">
                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</span>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined text-slate-400 absolute left-3 pointer-events-none">
                            alternate_email
                        </span>
                        <input formControlName="email" type="email" placeholder="you@example.com"
                            class="w-full rounded-xl border bg-white/90 px-10 py-3 text-base text-slate-900 outline-none focus:ring-4 transition-all duration-300 hover:-translate-y-0.5 dark:bg-slate-900/70 dark:text-white"
                            [class.border-red-500]="(verifyForm.get('email')?.invalid && verifyForm.get('email')?.touched) || emailMismatch()"
                            [class.border-slate-300]="!((verifyForm.get('email')?.invalid && verifyForm.get('email')?.touched) || emailMismatch())"
                            [class.focus:border-red-500]="emailMismatch()"
                            [class.focus:ring-red-500/20]="emailMismatch()"
                            [class.focus:border-[#2463eb]]="!emailMismatch()"
                            [class.focus:ring-[#2463eb]/20]="!emailMismatch()" />
                    </div>

                    @if (verifyForm.get('email')?.invalid && verifyForm.get('email')?.touched && !emailMismatch()) {
                    <p class="text-xs text-red-500">Please enter a valid email address.</p>
                    }

                    @if (emailMismatch()) {
                    <p class="text-xs text-red-500 flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">error</span>
                        This email does not match the verification link.
                    </p>
                    }
                </label>

                <button type="submit" [disabled]="verifyForm.invalid || isLoading()"
                    class="flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-[#2463eb] to-indigo-500 text-base font-bold text-white transition-all duration-300 hover:from-[#1f58d1] hover:to-indigo-600 hover:-translate-y-0.5 hover:shadow-lg hover:shadow-[#2463eb]/30 disabled:opacity-50 disabled:cursor-not-allowed">
                    @if (isLoading()) {
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Verifying...
                    } @else {
                    Verify & Continue
                    <span class="material-symbols-outlined text-sm">check_circle</span>
                    }
                </button>

            </form>
        </div>

        <button (click)="ToLogin()"
            class="flex w-full items-center justify-center gap-2 text-sm font-medium text-slate-500 hover:text-[#2463eb] dark:text-slate-400 transition-colors">
            <span class="material-symbols-outlined text-base">arrow_back</span>
            Back to Login
        </button>

    </main>
</div>
