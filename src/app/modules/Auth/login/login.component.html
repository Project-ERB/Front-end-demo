<div
  class="auth-photo-bg relative flex min-h-screen flex-col items-center justify-center overflow-x-hidden p-4 md:p-6 font-display main text-[#111318] dark:text-gray-200">
  <div
    class="pointer-events-none absolute left-0 top-0 h-[20rem] w-[20rem] rounded-full bg-main/20 blur-3xl -translate-x-1/3 -translate-y-1/3">
  </div>
  <div
    class="pointer-events-none absolute right-0 bottom-0 h-[22rem] w-[22rem] rounded-full bg-cyan-400/20 blur-3xl translate-x-1/4 translate-y-1/4">
  </div>
  <div @logoReveal class="flex items-center gap-3 z-10">
    <div class="size-8 text-main">
      <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M39.5563 34.1455V13.8546C39.5563 15.708 36.8773 17.3437 32.7927 18.3189C30.2914 18.916 27.263 19.2655 24 19.2655C20.737 19.2655 17.7086 18.916 15.2073 18.3189C11.1227 17.3437 8.44365 15.708 8.44365 13.8546V34.1455C8.44365 35.9988 11.1227 37.6346 15.2073 38.6098C17.7086 39.2069 20.737 39.5564 24 39.5564C27.263 39.5564 30.2914 39.2069 32.7927 38.6098C36.8773 37.6346 39.5563 35.9988 39.5563 34.1455Z"
          fill="currentColor"></path>
        <path clip-rule="evenodd" d="M10.4485 13.8519..." fill="currentColor" fill-rule="evenodd"></path>
      </svg>
    </div>
    <h2 class="text-[#111318] dark:text-white text-lg font-bold">
      Company Logo
    </h2>
  </div>
  <main @cardReveal class="w-full max-w-md shadow-2xl mt-10 mb-16 z-10">
    <div
      class="glass-shimmer rounded-2xl border border-white/60 dark:border-gray-700/60 bg-white/85 dark:bg-[#151c2c]/85 backdrop-blur-xl shadow-[0_20px_70px_rgba(15,23,42,0.2)] relative overflow-hidden">
      <div class="flex flex-col p-8 sm:p-10">
        <span class="mx-auto mb-2 w-fit rounded-full bg-main/10 px-3 py-1 text-xs font-semibold tracking-wide text-main">Secure
          Access</span>
        <h1 class="text-[#111318] dark:text-white tracking-tight text-3xl font-bold pb-2 text-center">
          Customer Login
        </h1>
        <p class="text-center text-[#616f89] dark:text-gray-400 text-base">
          Welcome back! Sign in to your account.
        </p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="mt-8 space-y-6">
          <label class="flex flex-col">
            <span class="text-[#111318] dark:text-gray-200 text-sm font-medium pb-2"> Email</span>
            <div class="relative flex w-full items-center">
              <span class="material-symbols-outlined absolute left-3.5 text-gray-400 dark:text-gray-500">person</span>
              <input formControlName="email"
                class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white/90 dark:bg-gray-800/60 pl-11 pr-4 h-12 focus:ring-4 focus:ring-main/20 focus:border-main transition-all duration-300 hover:border-main/60 hover:-translate-y-0.5"
                placeholder="Enter your email" type="text" />
            </div>
          </label>

          <label class="flex flex-col">
            <span class="text-[#111318] dark:text-gray-200 text-sm font-medium pb-2">Password</span>
            <div class="relative flex w-full items-center">
              <span class="material-symbols-outlined absolute left-3.5 text-gray-400 dark:text-gray-500">lock</span>
              <input formControlName="password" [type]="isPasswordVisible() ? 'text' : 'password'"
                class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white/90 dark:bg-gray-800/60 pl-11 pr-11 h-12 focus:ring-4 focus:ring-main/20 focus:border-main transition-all duration-300 hover:border-main/60 hover:-translate-y-0.5"
                placeholder="Enter your password" />

              <button type="button" (click)="togglePasswordVisibility()"
                class="absolute right-0 h-full px-3.5 text-gray-500 dark:text-gray-400 hover:text-main">
                <span class="material-symbols-outlined text-xl">
                  {{ isPasswordVisible ()? "visibility" : "visibility_off" }}
                </span>
              </button>
            </div>
          </label>

          <label for="" class="flex flex-col">
            <span class="text-[#111318] dark:text-gray-200 text-sm font-medium pb-2">Confirm Password</span>
            <div class="relative flex w-full items-center">
              <span class="material-symbols-outlined absolute left-3.5 text-gray-400 dark:text-gray-500">lock</span>
              <input formControlName="confirmPassword" [type]="isPasswordVisible() ? 'text' : 'password'"
                class="form-input w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-white/90 dark:bg-gray-800/60 pl-11 pr-11 h-12 focus:ring-4 focus:ring-main/20 focus:border-main transition-all duration-300 hover:border-main/60 hover:-translate-y-0.5"
                placeholder="Confirm your password" />
            </div>
          </label>

          <div class="flex items-center justify-end">
            <a (click)="ToForgotPassword()" class="text-sm font-medium text-main hover:underline cursor-pointer">Forgot Password?</a>
          </div>

          <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="flex w-full items-center justify-center gap-2 cursor-pointer rounded-xl h-12 bg-gradient-to-r from-main to-indigo-500 text-white text-base font-bold transition-all duration-300 hover:from-hover-main hover:to-indigo-600 focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-0.5 hover:shadow-lg hover:shadow-main/30 active:scale-95">

            <!-- Loading Spinner -->
            @if (isLoading) {
            <span class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            }

            <!-- Text -->
            <span>
              {{ isLoading ? 'Loading...' : 'Login' }}
            </span>

          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-[#616f89] dark:text-gray-400 text-sm">
            Don't have an account?
            <span (click)="ToRegister()" class="font-bold text-main hover:underline cursor-pointer">Register Now</span>
          </p>
        </div>
      </div>
    </div>
  </main>
</div>
