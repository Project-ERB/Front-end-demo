<main class="flex flex-1 justify-center items-center p-4 sm:p-6 lg:p-8 min-h-screen bg-background-light dark:bg-background-dark font-display">
    <div class="w-full max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[720px] bg-white dark:bg-gray-800 shadow-xl rounded-xl overflow-hidden">
            <div class="relative hidden lg:flex flex-col justify-center p-12 bg-gray-100 dark:bg-gray-900/50">
                <div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-lg" style="
            background-image: url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=2426&auto=format&fit=crop');
          "></div>
            </div>

            <div class="flex flex-col justify-center p-8 sm:p-12 lg:p-16">
                <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 w-full max-w-md mx-auto">
                    <div class="flex flex-col gap-3 text-center lg:text-left">
                        <h1 class="text-3xl font-black leading-tight tracking-tight text-gray-900 dark:text-white">
                            Create Your Account
                        </h1>
                        <p class="text-base font-normal text-gray-500 dark:text-gray-300">
                            Join us to enjoy exclusive offers and a seamless shopping experience.
                        </p>
                    </div>

                    <div class="flex flex-col gap-4">
                        <label class="flex flex-col">
              <span
                class="pb-2 text-sm font-medium text-gray-900 dark:text-gray-200"
                >Username</span
              >
              <input
                formControlName="username"
                type="text"
                placeholder="Enter your username"
                class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-primary focus:border-primary h-12 p-3"
              />
            </label>

                        <label class="flex flex-col">
              <span
                class="pb-2 text-sm font-medium text-gray-900 dark:text-gray-200"
                >Email</span
              >
              <input
                formControlName="email"
                type="email"
                placeholder="Enter your email"
                class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-primary focus:border-primary h-12 p-3"
              />
            </label>

                        <label class="flex flex-col">
              <span
                class="pb-2 text-sm font-medium text-gray-900 dark:text-gray-200"
                >Password</span
              >
              <div class="flex relative">
                <input
                  [type]="showPassword() ? 'text' : 'password'"
                  formControlName="password"
                  placeholder="Enter your password"
                  class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-primary focus:border-primary h-12 p-3 pr-12"
                />
                <button
                  type="button"
                  (click)="togglePassword()"
                  class="absolute right-3 top-3 text-gray-400 hover:text-primary"
                >
                  <span class="material-symbols-outlined">{{
                    showPassword() ? "visibility_off" : "visibility"
                  }}</span>
                </button>
              </div>
              <p class="text-xs text-gray-500 mt-1.5">
                Must be at least 8 characters long.
              </p>
            </label>

                        <label class="flex flex-col">
              <span
                class="pb-2 text-sm font-medium text-gray-900 dark:text-gray-200"
                >Confirm Password</span
              >
              <div class="flex relative">
                <input
                  [type]="showConfirmPassword() ? 'text' : 'password'"
                  formControlName="confirmPassword"
                  placeholder="Confirm your password"
                  class="w-full rounded-lg border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-primary focus:border-primary h-12 p-3 pr-12"
                />
                <button
                  type="button"
                  (click)="toggleConfirmPassword()"
                  class="absolute right-3 top-3 text-gray-400 hover:text-primary"
                >
                  <span class="material-symbols-outlined">{{
                    showConfirmPassword() ? "visibility_off" : "visibility"
                  }}</span>
                </button>
              </div>
            </label>
                    </div>

                    <div class="flex flex-col gap-4">
                        <div class="flex items-start gap-3">
                            <input formControlName="agreeToTerms" id="terms" type="checkbox" class="h-5 w-5 rounded border-gray-300 text-primary focus:ring-primary" />
                            <label for="terms" class="text-sm text-gray-500 dark:text-gray-300">
                By creating an account, you agree to our
                <a href="#" class="font-semibold text-primary hover:underline"
                  >Terms of Service</a
                >.
              </label>
                        </div>

                        <button type="submit" [disabled]="registerForm.invalid" class="h-12 w-full bg-primary hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-lg transition-colors">
              Create Account
            </button>
                    </div>

                    <p class="text-sm text-center text-gray-500 dark:text-gray-300">
                        Already have an account?
                        <span class="font-semibold text-primary hover:underline cursor-pointer" (click)="ToLogin()">Log In</span
            >
          </p>
        </form>
      </div>
    </div>
  </div>
</main>
